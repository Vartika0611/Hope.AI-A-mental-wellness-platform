{% extends 'base.html' %}
{% load static %}

{% block title %}PTSD Test | Hope.AI{% endblock %}

{% block content %}
<h2 class="text-center fw-bold mb-4">PTSD Self-Assessment</h2>
<p class="text-center"><strong>Time left: <span id="timer" class="text-danger">05:00</span></strong></p>

<form id="ptsd-form" class="container">
  <ol class="list-unstyled">
    <li class="mb-3 p-3 border rounded shadow-sm bg-light">
      <label class="form-label fw-semibold">I have repeated, disturbing memories, thoughts, or images of a stressful experience from the past.</label>
      <select name="q1" class="form-select" required>
        <option value="0">Not at all</option>
        <option value="1">A little</option>
        <option value="2">Moderately</option>
        <option value="3">Extremely</option>
      </select>
    </li>

    <li class="mb-3 p-3 border rounded shadow-sm bg-light">
      <label class="form-label fw-semibold">I have repeated, disturbing dreams of a stressful experience from the past.</label>
      <select name="q2" class="form-select" required>
        <option value="0">Not at all</option>
        <option value="1">A little</option>
        <option value="2">Moderately</option>
        <option value="3">Extremely</option>
      </select>
    </li>

    <li class="mb-3 p-3 border rounded shadow-sm bg-light">
      <label class="form-label fw-semibold">I suddenly act or feel as if a stressful experience were happening again.</label>
      <select name="q3" class="form-select" required>
        <option value="0">Not at all</option>
        <option value="1">A little</option>
        <option value="2">Moderately</option>
        <option value="3">Extremely</option>
      </select>
    </li>

    <li class="mb-3 p-3 border rounded shadow-sm bg-light">
      <label class="form-label fw-semibold">I feel very upset when something reminds me of a stressful experience.</label>
      <select name="q4" class="form-select" required>
        <option value="0">Not at all</option>
        <option value="1">A little</option>
        <option value="2">Moderately</option>
        <option value="3">Extremely</option>
      </select>
    </li>

    <li class="mb-3 p-3 border rounded shadow-sm bg-light">
      <label class="form-label fw-semibold">I have physical reactions (e.g., heart pounding, trouble breathing) when reminded of a stressful experience.</label>
      <select name="q5" class="form-select" required>
        <option value="0">Not at all</option>
        <option value="1">A little</option>
        <option value="2">Moderately</option>
        <option value="3">Extremely</option>
      </select>
    </li>

    <li class="mb-3 p-3 border rounded shadow-sm bg-light">
      <label class="form-label fw-semibold">I avoid thinking about or talking about a stressful experience.</label>
      <select name="q6" class="form-select" required>
        <option value="0">Not at all</option>
        <option value="1">A little</option>
        <option value="2">Moderately</option>
        <option value="3">Extremely</option>
      </select>
    </li>

    <li class="mb-3 p-3 border rounded shadow-sm bg-light">
      <label class="form-label fw-semibold">I avoid activities or situations because they remind me of a stressful experience.</label>
      <select name="q7" class="form-select" required>
        <option value="0">Not at all</option>
        <option value="1">A little</option>
        <option value="2">Moderately</option>
        <option value="3">Extremely</option>
      </select>
    </li>

    <li class="mb-3 p-3 border rounded shadow-sm bg-light">
      <label class="form-label fw-semibold">I have trouble remembering important parts of a stressful experience.</label>
      <select name="q8" class="form-select" required>
        <option value="0">Not at all</option>
        <option value="1">A little</option>
        <option value="2">Moderately</option>
        <option value="3">Extremely</option>
      </select>
    </li>

    <li class="mb-3 p-3 border rounded shadow-sm bg-light">
      <label class="form-label fw-semibold">I feel distant or cut off from other people.</label>
      <select name="q9" class="form-select" required>
        <option value="0">Not at all</option>
        <option value="1">A little</option>
        <option value="2">Moderately</option>
        <option value="3">Extremely</option>
      </select>
    </li>

    <li class="mb-3 p-3 border rounded shadow-sm bg-light">
      <label class="form-label fw-semibold">I feel emotionally numb or unable to have loving feelings.</label>
      <select name="q10" class="form-select" required>
        <option value="0">Not at all</option>
        <option value="1">A little</option>
        <option value="2">Moderately</option>
        <option value="3">Extremely</option>
      </select>
    </li>

    <li class="mb-3 p-3 border rounded shadow-sm bg-light">
      <label class="form-label fw-semibold">I feel irritable or have angry outbursts.</label>
      <select name="q11" class="form-select" required>
        <option value="0">Not at all</option>
        <option value="1">A little</option>
        <option value="2">Moderately</option>
        <option value="3">Extremely</option>
      </select>
    </li>

    <li class="mb-3 p-3 border rounded shadow-sm bg-light">
      <label class="form-label fw-semibold">I have trouble concentrating or staying focused.</label>
      <select name="q12" class="form-select" required>
        <option value="0">Not at all</option>
        <option value="1">A little</option>
        <option value="2">Moderately</option>
        <option value="3">Extremely</option>
      </select>
    </li>
  </ol>

  <div class="text-center mt-4">
    <button type="submit" class="btn btn-success px-4 py-2">Submit</button>
  </div>
</form>

<div id="time-over-message" class="text-center mt-4" style="display: none;">
  <h4 class="text-danger fw-bold">Time Over!</h4>
  <button class="btn btn-warning mt-2" onclick="location.reload()">Try Again</button>
</div>

<div id="result-section" style="display: none;" class="mt-5 text-center">
  <h4 id="result-message" class="fw-bold"></h4>
  <canvas id="ptsdResultChart" style="max-width: 500px; width: 100%; height: auto; margin: 0 auto;"></canvas>
  <button class="btn btn-warning mt-3" onclick="location.reload()">Try Again</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
  let timeLeft = 300;
  const timerDisplay = document.getElementById("timer");
  const form = document.getElementById("ptsd-form");
  const resultSection = document.getElementById("result-section");
  const resultMessage = document.getElementById("result-message");
  const timeOverMessage = document.getElementById("time-over-message");
  const chartCanvas = document.getElementById("ptsdResultChart");
  let isTimeOver = false;

  const countdown = setInterval(() => {
    let min = Math.floor(timeLeft / 60);
    let sec = timeLeft % 60;
    timerDisplay.textContent = `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
    timeLeft--;

    if (timeLeft < 0) {
      clearInterval(countdown);
      isTimeOver = true;
      form.style.display = "none";
      timeOverMessage.style.display = "block";
      timerDisplay.textContent = "Time Over";
    }
  }, 1000);

  form.addEventListener("submit", function (e) {
    e.preventDefault();
    if (isTimeOver) return;

    clearInterval(countdown);

    let total = 0;
    for (let i = 1; i <= 12; i++) {
      total += parseInt(document.querySelector(`select[name="q${i}"]`).value);
    }

    form.style.display = "none";
    resultSection.style.display = "block";

    let level = "Minimal";
    if (total >= 10 && total < 20) level = "Moderate";
    else if (total >= 20) level = "High";

    resultMessage.innerText = `Your Anxiety Level: ${level} (${total}/36)`;

    new Chart(chartCanvas, {
      type: 'bar',
      data: {
        labels: ['Anxiety Score'],
        datasets: [{
          label: 'Your Score',
          data: [total],
          backgroundColor: '#198754',
          borderColor: '#145c44',
          borderWidth: 1
        }]
      },
      options: {
        scales: {
          y: {
            beginAtZero: true,
            max: 36
          }
        }
      }
    });
  });
</script>
{% endblock %}
