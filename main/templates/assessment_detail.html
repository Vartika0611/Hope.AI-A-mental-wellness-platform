<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ assessment.title }} Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2 class="text-center">{{ assessment.title }}</h2>
    <p class="text-center">{{ assessment.description }}</p>
    <form>
        {% for question in questions %}
        <div class="mb-3">
            <label class="form-label">{{ question.text }}</label>
            <select class="form-select">
                <option>Not at all</option>
                <option>Several days</option>
                <option>More than half the days</option>
                <option>Nearly every day</option>
            </select>
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-success">Submit</button>
    </form>
</div>
</body>
</html>
