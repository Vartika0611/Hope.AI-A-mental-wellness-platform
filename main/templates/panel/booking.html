<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Booking Details</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f6fffc;
      margin: 0;
      padding: 20px;
    }
    .steps {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }
    .steps a {
      text-decoration: none;
      color: gray;
      font-weight: normal;
    }
    .steps a.active {
      color: black;
      font-weight: bold;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
      max-width: 600px;
      margin: auto;
    }
    .label {
      font-weight: bold;
      margin-top: 20px;
      display: block;
    }
    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    .button {
      background: #007e5a;
      color: white;
      border: none;
      padding: 12px 20px;
      margin-top: 25px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 1rem;
    }
    .button:hover {
      background: #005f46;
    }
  </style>
</head>
<body>

  <div class="steps">
    <a href="javascript:void(0);" onclick="goBack()">1 Therapist Profile</a>

    <a href="#" class="active">2 Booking Details</a>
    <a href="#" id="paymentLink">3 Payment Details</a>
  </div>

  <div class="container">
    <h2>Book a Session with <span id="therapistName">Therapist</span></h2>

    <label class="label">Select Date</label>
    <input type="date" id="date" />

    <label class="label">Select Time</label>
    <select id="time">
      <option>10:00 AM</option>
      <option>02:30 PM</option>
      <option>05:45 PM</option>
      <option>08:00 PM</option>
    </select>

    <button class="button" onclick="goToPayment()">Proceed to Payment</button>
  </div>

  <script>
    window.onload = function() {
      const urlParams = new URLSearchParams(window.location.search);
      const name = urlParams.get('name') || "Therapist";

      const displayName = name.charAt(0).toUpperCase() + name.slice(1);
      document.getElementById("therapistName").innerText = displayName;

      // Update links
      document.getElementById("paymentLink").href = `/panel/payment/?name=${name}`;
    };

    function goToPayment() {
      const urlParams = new URLSearchParams(window.location.search);
      const name = urlParams.get('name') || "Therapist";
      window.location.href = `/panel/payment/?name=${name}`;
    }

    function goBack() {
      const urlParams = new URLSearchParams(window.location.search);
      const name = urlParams.get('name') || "Therapist";
      window.location.href = `/panel/${name.toLowerCase()}`;
    }
  </script>

</body>
</html>
