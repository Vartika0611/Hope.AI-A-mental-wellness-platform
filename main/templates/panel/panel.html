
{% extends 'base.html' %}

{% block title %}Expert Panel | Hope.AI{% endblock %}

{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Psychologist Cards</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f9f9f9;
      padding: 20px;
    }
    .card-container {
      display: flex;
      flex-wrap: wrap;
      gap: 50px;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      width: 500px;
      padding: 20px;
      transition: transform 0.2s;
      cursor: pointer;
    }
    .card:hover {
      transform: translateY(-5px);
    }
    .profile-img {
      width: 100%;
      height: 200px;
      border-radius: 10px;
      object-fit: cover;
    }
    .name {
      font-size: 1.3rem;
      font-weight: 600;
      margin: 10px 0 4px;
    }
    .title, .languages, .specialties, .price, .next-slot, .rating {
      font-size: 0.9rem;
      margin: 4px 0;
    }
    .rating {
      color: #f39c12;
    }
  </style>
</head>
<body>

<h2 style="text-align: center;">Available Psychologists</h2>

<div class="card-container" id="card-container">
  <!-- Cards will be injected here -->
</div>

<script>

    },
    
  ];

  const container = document.getElementById('card-container');

  psychologists.forEach(doc => {
    container.innerHTML += `
      <div class="card" onclick="redirectToProfile('${encodeURIComponent(doc.name)}')">
        <img src="${doc.img}" alt="${doc.name}" class="profile-img">
        <div class="name">${doc.name}</div>
        <div class="title">${doc.title}</div>
        <div class="languages"><strong>Languages:</strong> ${doc.languages}</div>
        <div class="specialties"><strong>Specialties:</strong> ${doc.specialties}</div>
        <div class="price"><strong>Price:</strong> ${doc.price}</div>
        <div class="next-slot"><strong>Next slot:</strong> ${doc.slot}</div>
        <div class="rating"><strong>★</strong> ${doc.rating}</div>
        
        
      </div>

window.location.href = `/panel/${name.toLowerCase()}/`;
}

console.log(encodeURIComponent(doc.name))
</script>

</body>
</html>

{% endblock %}
