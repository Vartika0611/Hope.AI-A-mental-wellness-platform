<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment Details</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f0fdf4;
      margin: 0;
      padding: 20px;
    }
    .steps {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }
    .steps a {
      text-decoration: none;
      color: gray;
    }
    .steps a.active {
      font-weight: bold;
      color: black;
    }
    .container {
      background: white;
      padding: 30px;
      max-width: 600px;
      margin: auto;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
    }
    .summary {
      font-size: 1rem;
      line-height: 1.6;
    }
    .pay-btn {
      background-color: #007e5a;
      color: white;
      border: none;
      border-radius: 30px;
      padding: 12px 20px;
      font-size: 1rem;
      margin-top: 20px;
      cursor: pointer;
    }
    .pay-btn:hover {
      background-color: #005f46;
    }
  </style>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>

  <div class="steps">
    <a href="#" onclick="goBack()">1 Therapist Profile</a>
    <a href="booking.html?name=" id="bookLink">2 Booking Details</a>
    <a href="{% url 'payment' %}" class="active">3 Payment Details</a>
  </div>

  <div class="container">
    <h2>Complete Payment for <span id="therapistName">Therapist</span></h2>

    <div class="summary">
      <p><strong>Session Duration:</strong> 60 mins</p>
      <p><strong>Fee:</strong> ₹900</p>
      <p><strong>Language:</strong> English, Hindi</p>
    </div>

    <button class="pay-btn" onclick="payNow()">Pay Now</button>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const name = urlParams.get('name') || "Therapist";
    const displayName = name.charAt(0).toUpperCase() + name.slice(1);
    document.getElementById("therapistName").innerText = displayName;
    document.getElementById("bookLink").href = `/panel/booking/?name=${name}`;


    function goBack() {
      window.location.href = `/panel/${name.toLowerCase()}/`;

    }

    function payNow() {
      const options = {
        key: "rzp_test_1DP5mmOlF5G5ag", // Razorpay Test Key
        amount: 90000, // 900 INR in paise
        currency: "INR",
        name: "HopeAI Therapy",
        description: "Therapist Session Booking",
        image: "https://your-logo-url.com/logo.png",
        handler: function (response) {
          alert("Payment Successful! Payment ID: " + response.razorpay_payment_id);
        },
        prefill: {
          name: "Hope User",
          email: "user@example.com",
          contact: "9999999999"
        },
        notes: {
          therapist: displayName
        },
        theme: {
          color: "#007e5a"
        }
      };
      const rzp = new Razorpay(options);
      rzp.open();
    }
  </script>

</body>
</html>
