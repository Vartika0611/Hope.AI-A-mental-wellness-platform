{% extends 'base.html' %}
{% load static %}

{% block title %}Sleep Quality Test | Hope.AI{% endblock %}

{% block content %}
<h2 class="text-center fw-bold mb-4">Sleep Quality Self-Assessment</h2>
<p class="text-center"><strong>Time left: <span id="timer" class="text-danger">05:00</span></strong></p>

<form id="sleep-form" class="container">
  <ol class="list-unstyled">
    <li class="mb-3 p-3 border rounded shadow-sm bg-light">
      <label class="form-label fw-semibold">I had difficulty falling asleep within 30 minutes.</label>
      <select name="q1" class="form-select" required>
        <option value="0">Not during the past month</option>
        <option value="1">Less than once a week</option>
        <option value="2">Once or twice a week</option>
        <option value="3">Three or more times a week</option>
      </select>
    </li>
    
    <li class="mb-3 p-3 border rounded shadow-sm bg-light">
      <label class="form-label fw-semibold">I woke up in the middle of the night or early morning.</label>
      <select name="q2" class="form-select" required>
        <option value="0">Not during the past month</option>
        <option value="1">Less than once a week</option>
        <option value="2">Once or twice a week</option>
        <option value="3">Three or more times a week</option>
      </select>
    </li>

    <li class="mb-3 p-3 border rounded shadow-sm bg-light">
      <label class="form-label fw-semibold">I had to get up to use the bathroom.</label>
      <select name="q3" class="form-select" required>
        <option value="0">Not during the past month</option>
        <option value="1">Less than once a week</option>
        <option value="2">Once or twice a week</option>
        <option value="3">Three or more times a week</option>
      </select>
    </li>

    <li class="mb-3 p-3 border rounded shadow-sm bg-light">
      <label class="form-label fw-semibold">I had bad dreams that disturbed my sleep.</label>
      <select name="q4" class="form-select" required>
        <option value="0">Not during the past month</option>
        <option value="1">Less than once a week</option>
        <option value="2">Once or twice a week</option>
        <option value="3">Three or more times a week</option>
      </select>
    </li>

    <li class="mb-3 p-3 border rounded shadow-sm bg-light">
      <label class="form-label fw-semibold">I felt too hot or too cold during the night.</label>
      <select name="q5" class="form-select" required>
        <option value="0">Not during the past month</option>
        <option value="1">Less than once a week</option>
        <option value="2">Once or twice a week</option>
        <option value="3">Three or more times a week</option>
      </select>
    </li>

    <li class="mb-3 p-3 border rounded shadow-sm bg-light">
      <label class="form-label fw-semibold">I had pain that disrupted my sleep.</label>
      <select name="q6" class="form-select" required>
        <option value="0">Not during the past month</option>
        <option value="1">Less than once a week</option>
        <option value="2">Once or twice a week</option>
        <option value="3">Three or more times a week</option>
      </select>
    </li>

    <li class="mb-3 p-3 border rounded shadow-sm bg-light">
      <label class="form-label fw-semibold">I had trouble staying awake during daytime activities.</label>
      <select name="q7" class="form-select" required>
        <option value="0">Not during the past month</option>
        <option value="1">Less than once a week</option>
        <option value="2">Once or twice a week</option>
        <option value="3">Three or more times a week</option>
      </select>
    </li>

    <li class="mb-3 p-3 border rounded shadow-sm bg-light">
      <label class="form-label fw-semibold">I took sleeping pills or medication to help me sleep.</label>
      <select name="q8" class="form-select" required>
        <option value="0">Not during the past month</option>
        <option value="1">Less than once a week</option>
        <option value="2">Once or twice a week</option>
        <option value="3">Three or more times a week</option>
      </select>
    </li>

    <li class="mb-3 p-3 border rounded shadow-sm bg-light">
      <label class="form-label fw-semibold">I felt my sleep was not refreshing or restorative.</label>
      <select name="q9" class="form-select" required>
        <option value="0">Not during the past month</option>
        <option value="1">Less than once a week</option>
        <option value="2">Once or twice a week</option>
        <option value="3">Three or more times a week</option>
      </select>
    </li>

    <li class="mb-3 p-3 border rounded shadow-sm bg-light">
      <label class="form-label fw-semibold">I was satisfied with my overall sleep quality.</label>
      <select name="q10" class="form-select" required>
        <option value="0">Very satisfied</option>
        <option value="1">Satisfied</option>
        <option value="2">Dissatisfied</option>
        <option value="3">Very dissatisfied</option>
      </select>
    </li>

    <li class="mb-3 p-3 border rounded shadow-sm bg-light">
      <label class="form-label fw-semibold">I had trouble getting out of bed in the morning.</label>
      <select name="q11" class="form-select" required>
        <option value="0">Not during the past month</option>
        <option value="1">Less than once a week</option>
        <option value="2">Once or twice a week</option>
        <option value="3">Three or more times a week</option>
      </select>
    </li>

    <li class="mb-3 p-3 border rounded shadow-sm bg-light">
      <label class="form-label fw-semibold">I felt fatigued during the day due to poor sleep.</label>
      <select name="q12" class="form-select" required>
        <option value="0">Not during the past month</option>
        <option value="1">Less than once a week</option>
        <option value="2">Once or twice a week</option>
        <option value="3">Three or more times a week</option>
      </select>
    </li>
  </ol>

  <div class="text-center mt-4">
    <button type="submit" class="btn btn-success px-4 py-2">Submit</button>
  </div>
</form>

<div id="time-over-message" class="text-center mt-4" style="display: none;">
  <h4 class="text-danger fw-bold">Time Over!</h4>
  <button class="btn btn-warning mt-2" onclick="location.reload()">Try Again</button>
</div>

<div id="result-section" style="display: none;" class="mt-5 text-center">
  <h4 id="result-message" class="fw-bold"></h4>
  <canvas id="sleepResultChart" style="max-width: 500px; width: 100%; height: auto; margin: 0 auto;"></canvas>
  <button class="btn btn-warning mt-3" onclick="location.reload()">Try Again</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
  let timeLeft = 300;
  const timerDisplay = document.getElementById("timer");
  const form = document.getElementById("sleep-form");
  const resultSection = document.getElementById("result-section");
  const resultMessage = document.getElementById("result-message");
  const timeOverMessage = document.getElementById("time-over-message");
  const chartCanvas = document.getElementById("sleepResultChart");
  let isTimeOver = false;

  const countdown = setInterval(() => {
    let min = Math.floor(timeLeft / 60);
    let sec = timeLeft % 60;
    timerDisplay.textContent = `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
    timeLeft--;

    if (timeLeft < 0) {
      clearInterval(countdown);
      isTimeOver = true;
      form.style.display = "none";
      timeOverMessage.style.display = "block";
      timerDisplay.textContent = "Time Over";
    }
  }, 1000);

  form.addEventListener("submit", function (e) {
    e.preventDefault();
    if (isTimeOver) return;

    clearInterval(countdown);

    let total = 0;
    for (let i = 1; i <= 12; i++) {
      total += parseInt(document.querySelector(`select[name="q${i}"]`).value);
    }

    form.style.display = "none";
    resultSection.style.display = "block";

    let level = "Minimal";
    if (total >= 10 && total < 20) level = "Moderate";
    else if (total >= 20) level = "High";

    resultMessage.innerText = `Your Anxiety Level: ${level} (${total}/36)`;

    new Chart(chartCanvas, {
      type: 'bar',
      data: {
        labels: ['Anxiety Score'],
        datasets: [{
          label: 'Your Score',
          data: [total],
          backgroundColor: '#198754',
          borderColor: '#145c44',
          borderWidth: 1
        }]
      },
      options: {
        scales: {
          y: {
            beginAtZero: true,
            max: 36
          }
        }
      }
    });
  });
</script>

{% endblock %}
